[project]
name = "deepchemography"
version = "0.1.0"
description = "LSTM Autoencoder for SMILES molecular representations"
authors = [
    {name = "Alexander Orlov", email = "aorlov@example.com"},
]
dependencies = [
    "torch",
    "numpy>=1.24.0",
    "pandas>=2.0.0",
    "tqdm>=4.65.0",
    "rdkit>=2023.3.1",
    "ipykernel",
]
requires-python = ">=3.9"
readme = "README.md"
license = {text = "MIT"}

[project.optional-dependencies]
dev = [
    "jupyter>=1.0.0",
    "matplotlib>=3.7.0",
]

[build-system]
requires = ["pdm-backend"]
build-backend = "pdm.backend"

[tool.pdm]
distribution = true
